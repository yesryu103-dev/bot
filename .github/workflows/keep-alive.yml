# Ping Render Free Web Service so it does not spin down from inactivity.
name: Keep Render Awake

on:
  schedule:
    # Every 10 minutes (Render free sleeps after ~15 min idle)
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          set -e
          URL="${{ vars.RENDER_HEALTH_URL }}"
          if [ -z "$URL" ]; then
            URL="https://bot-ich.onrender.com/healthz"
          fi
          echo "Pinging $URL"
          curl -fsS --retry 3 --retry-delay 5 --max-time 90 "$URL"
          echo
          echo "OK"
